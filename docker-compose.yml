services:
  web:
    image: nginx:alpine
    container_name: ttai-web-1
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf
      - ./frontend:/usr/share/nginx/html
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./logs/frontend:/var/log/nginx
    depends_on:
      - wechat-login
    networks:
      - mynetwork
    restart: unless-stopped

  wechat-login:
    image: ttai-wechat-backend
    container_name: ttai-wechat-login-1
    mem_limit: 384m
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=256
      - WECHAT_APPID=${WECHAT_APPID}
      - WECHAT_SECRET=${WECHAT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - FASTAPI_URL=${FASTAPI_URL}
      - MONGODB_URI=${MONGODB_URI}
      - MONGO_INITDB_ROOT_USERNAME=${MONGODB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGODB_ROOT_PASSWORD}
      - TZ=Asia/Shanghai
      - REDIS_URL=redis://redis:6379/1
      - TZ=Asia/Shanghai
    volumes:
      - ./wechat-backend:/app
      - ./data/uploads:/app/data/uploads
      - ./data/media:/app/data/media
      - ./logs/wechat:/var/log
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - redis
      - mongodb
    networks:
      - mynetwork
    restart: unless-stopped

  mongodb:
    image: mongo:6.0
    container_name: mongodb
    command: mongod --wiredTigerCacheSizeGB 0.25
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGODB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGODB_ROOT_PASSWORD}
      - TZ=Asia/Shanghai
    volumes:
      - mongodb_data:/data/db
    networks:
      - mynetwork
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 10s
      retries: 5

  redis:
    image: redis:latest
    container_name: ttai-redis-1
    command: redis-server --maxmemory 32mb --maxmemory-policy allkeys-lru
    networks:
      - mynetwork
    restart: unless-stopped

networks:
  mynetwork:
    driver: bridge

volumes:
  mongodb_data:
    external: true
    name: ttai_mongodb_data
