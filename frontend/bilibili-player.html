<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>B站视频</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
iframe { width: 100%; height: 100%; border: none; }
.fallback { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; color: #fff; font-size: 16px; background: #111; text-align: center; padding: 20px; }
.fallback a { color: #00a1d6; margin-top: 12px; text-decoration: none; }
</style>
</head>
<body>
<iframe id="player" allowfullscreen></iframe>
<div id="fallback" class="fallback">
  <p>视频加载失败</p>
  <a id="fallback-link" href="#">在B站App打开</a>
</div>
<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var bvid = params.get('bvid') || '';
  var player = document.getElementById('player');
  var fallback = document.getElementById('fallback');
  var link = document.getElementById('fallback-link');

  if (!bvid) {
    document.body.innerHTML = '<p style="color:#fff;text-align:center;padding-top:40vh;">缺少视频参数</p>';
    return;
  }

  player.src = 'https://player.bilibili.com/player.html?bvid=' + encodeURIComponent(bvid) + '&page=1&high_quality=1&autoplay=1';
  link.href = 'https://www.bilibili.com/video/' + bvid;

  setTimeout(function () {
    try {
      var doc = player.contentDocument || player.contentWindow && player.contentWindow.document;
      if (!doc || !doc.body || doc.body.innerHTML.trim() === '') {
        player.style.display = 'none';
        fallback.style.display = 'flex';
      }
    } catch (e) {
      // cross-origin, assume it loaded
    }
  }, 4000);
})();
</script>
</body>
</html>
