<!doctype html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>用户登录注册</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/uuid@8.3.2/dist/umd/uuid.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/spark-md5/3.0.2/spark-md5.min.js"></script>
    <script src="config.js"></script>
    <script src="wechat-auth.js"></script>
    <style>
        .container { max-width: 420px; margin: 50px auto; padding: 20px; }
        .tabs { display: flex; margin-bottom: 20px; }
        .tab {
            flex: 1; padding: 10px;
            text-align: center; cursor: pointer;
            border-bottom: 2px solid #ddd;
        }
        .tab.active { border-color: #007bff; }
        .form-group { margin-bottom: 15px; }
        input {
            width: 100%; padding: 8px;
            border: 1px solid #ddd; border-radius: 4px;
        }
        button {
            width: 100%; padding: 10px;
            background: #007bff; color: white; border: none;
            border-radius: 4px; cursor: pointer;
        }
        .captcha-btn {
            width: 120px; margin-left: 10px;
            background: #28a745;
        }
        .qrcode { text-align: center; margin: 20px 0; }
        .hidden { display: none; }
    </style>
  </head>
  <body>
    <div class="app-shell">
        <header class="topbar">
            <div class="topbar-inner">
                <a class="brand" href="index.html">
                    <span class="brand-mark">TT</span>
                    <span>TTAI 乒乓训练</span>
                </a>
                <nav class="nav-links">
                    <a href="index.html">首页</a>
                    <a href="videos.html">视频库</a>
                    <a href="stats.html">训练统计</a>
                    <a href="tech.html">技术训练</a>
                    <a href="my.html">我的</a>
                    <a class="active" href="login.html">登录</a>
                </nav>
            </div>
        </header>

        <main class="main">
            <div class="container">
                <section class="section">
                    <h2 class="card-title">登录你的训练空间</h2>
                    <p class="muted">扫码登录后即可同步训练记录与分析结果。</p>
                    <div class="empty-state" id="login-note" style="display: none;"></div>
                    <div class="tabs">
                        <div class="tab" data-type="email">邮箱登录</div>
                        <div class="tab" data-type="phone">手机登录</div>
                        <div class="tab active" data-type="wechat">微信扫码登录</div>
                    </div>

                    <div id="emailForm" class="form-content">
                        <input type="email" placeholder="请输入邮箱">
                        <input type="password" placeholder="请输入密码">
                        <button>登录</button>
                    </div>

                    <div id="phoneForm" class="form-content hidden">
                        <input type="tel" placeholder="请输入手机号">
                        <input type="password" placeholder="请输入密码">
                        <button>登录</button>
                    </div>

                    <div id="wechatLogin" class="form-content hidden">
                        <div id="qrcode-container">
                            <img id="qrcode" alt="微信登录二维码" style="width: 200px; height: 200px;" />
                        </div>
                    </div>
                </section>
            </div>
        </main>
        <footer>
            <p>&copy; <span id="year"></span> TTAI. All rights reserved.</p>
        </footer>
    </div>

    <script>
        const tabs = document.querySelectorAll('.tab');
        const formContents = document.querySelectorAll('.form-content');

        tabs.forEach(tab => {
            tab.addEventListener('click', function() {
                // 移除所有tab的active状态
                tabs.forEach(t => t.classList.remove('active'));
                // 隐藏所有表单内容
                formContents.forEach(content => content.classList.add('hidden'));

                // 设置当前tab为active
                this.classList.add('active');

                // 显示对应的内容
                const type = this.dataset.type;
                if(type === 'wechat') {
                    document.getElementById('wechatLogin').classList.remove('hidden');
                    // 如果需要初始化微信登录
                    wechatDirectLogin();
                } else {
                    document.getElementById(`${type}Form`).classList.remove('hidden');
                }
            });
        });


        // 移除所有tab的active状态
        tabs.forEach(t => t.classList.remove('active'));
        // 隐藏所有表单内容
        formContents.forEach(content => content.classList.add('hidden'));
        document.getElementById('wechatLogin').classList.remove('hidden');
        document.getElementById('wechatLogin').classList.add('active');
        wechatDirectLogin();

        document.getElementById('year').textContent = new Date().getFullYear();
        const noteEl = document.getElementById('login-note');
        const host = window.location.hostname;
        if (noteEl && (host === 'localhost' || host === '127.0.0.1')) {
            noteEl.textContent = '本地开发跳过二维码登录，后续上线再接入扫码。';
            noteEl.style.display = 'block';
        }

        // 发送验证码
        let countdown = 60;
        function sendCaptcha(type) {
            const btn = event.target;
            btn.disabled = true;

            // 这里调用发送验证码API
            fetch(`/api/send-captcha?type=${type}`)
                .then(res => res.json())
                .then(data => {
                    if(data.success) startCountdown(btn);
                });
        }

        function startCountdown(btn) {
            btn.textContent = `${countdown}秒后重发`;
            const timer = setInterval(() => {
                countdown--;
                if(countdown <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.textContent = '获取验证码';
                    countdown = 60;
                    return;
                }
                btn.textContent = `${countdown}秒后重发`;
            }, 1000);
        }

        // 微信登录处理
        function wechatDirectLogin() {
            console.log('wechatDirectLogin');
            // 从URL参数获取redirect参数
            const urlParams = new URLSearchParams(window.location.search);
            const redirectUrl = urlParams.get('redirect') || 'index.html'; // 默认跳转到index.html
            // 微信一键登录处理
            const apiBase = window.ttaiGetApiBase ? window.ttaiGetApiBase() : '/api';
            const wsUrl = window.ttaiGetWsUrl ? window.ttaiGetWsUrl() : 'wss://www.ttcut.com/ws';
            const auth = new WeChatAuth({
                qrCodeRefreshInterval: 30000,
                qrCodeEndpoint: apiBase + '/generate-qrcode',
                websocketUrl: wsUrl,
                redirectUrl: redirectUrl,
                qrCodeElementId: 'qrcode'
            });
            auth.init();
        }

        // 表单提交处理
        document.querySelectorAll('form').forEach(form => {
            form.addEventListener('submit', e => {
                e.preventDefault();
                const formData = new FormData(form);

                fetch('/api/login', {
                    method: 'POST',
                    body: JSON.stringify(Object.fromEntries(formData))
                }).then(res => {
                    if(res.ok) window.location.href = '/dashboard';
                });
            });
        });
    </script>
    <!-- 微信登录SDK -->
    <script src="https://res.wx.qq.com/connect/zh_CN/htmledition/js/wxLogin.js"></script>
  </body>
</html>
