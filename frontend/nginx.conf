user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    resolver 8.8.8.8 1.1.1.1 valid=300s;  # 使用 Google 或 Cloudflare 的公共 DNS
    resolver_timeout 5s;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    # 增大超时时间（按需调整）
    proxy_connect_timeout 600;
    proxy_send_timeout 600;
    proxy_read_timeout 600;

    # 启用分片上传优化
    proxy_request_buffering off;
    proxy_buffering off;

    # 设置最大请求体大小为1GB
    client_max_body_size 1024M;

    # 设置客户端请求体的超时时间为300秒
    client_body_timeout 300s;

    # 设置客户端请求头的超时时间为300秒
    client_header_timeout 300s;

    # 设置发送响应到客户端的超时时间为300秒
    send_timeout 300s;

    # 增加临时文件存储目录的最大容量
    client_body_temp_path /tmp/nginx_client_body_temp 1 2;
    client_body_buffer_size 50m;  # 缓冲区大小设置为50MB

    # include /etc/nginx/conf.d/*.conf;

    server {
        listen 80;
        server_name _;
        # return 301 https://$host$request_uri;  # 将所有 HTTP 请求重定向到 HTTPS
        # 屏蔽对 .env 文件的访问
        location ~ /\.env {
            deny all;
            return 404;
        }

        # 屏蔽对 .git 目录的访问
        location ~ /\.git {
            deny all;
            return 404;
        }

        # 屏蔽其他敏感文件
        location ~ /(\.aws|\.env\.|\.git\/|\.env\..*|\.env\..*\.\w+)$ {
            deny all;
            return 404;
        }

        location /.well-known/acme-challenge/ {
            root /usr/share/nginx/html;
            allow all;
        }
    # --- Dev Express 路由 (2026-06 新增) ---
    location /dev/ {
        proxy_pass http://wechat-dev:3001/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
        client_max_body_size 1024M;
        proxy_request_buffering off;
    }


        location / {
            root /usr/share/nginx/html;
            index index.html;
        }

        location /images/ {
            alias /usr/share/nginx/html/images/;
        }

        location /upload {
            proxy_pass http://47.117.152.124:5000/upload;  # 将请求转发到后端服务
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # 对于/upload路径，单独设置允许的最大请求体大小
            client_max_body_size 1024M;

            # 设置发送响应到客户端的超时时间为600秒
            send_timeout 600s;
            # 禁用自动添加斜杠
            rewrite ^/upload$ /upload break;
        }

        location /status {
            proxy_pass http://47.117.152.124:5000;  # 将请求转发到后端服务
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /download {
            proxy_pass http://47.117.152.124:5000;  # 将请求转发到后端服务
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

	# WebSocket 配置
        location /ws {
            proxy_pass http://wechat-login:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;

            proxy_read_timeout 3600s;  # 长连接超时时间
            proxy_send_timeout 3600s;
            proxy_buffering off;       # 禁用缓冲（关键）
            # 可选：如果你需要转发客户端的真实 IP 地址
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api {
            proxy_pass http://wechat-login:3000;  # 将请求转发到后端服务
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }


        location /wechat/ {
            proxy_pass http://wechat-login:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    server {
        listen 443 ssl;
        server_name www.ttcut.com;

	    ssl_certificate /etc/letsencrypt/live/www.ttcut.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/www.ttcut.com/privkey.pem;

	    # 新增 OCSP 配置
        ssl_stapling on;
        ssl_stapling_verify on;
        ssl_trusted_certificate /etc/letsencrypt/live/www.ttcut.com/chain.pem;
	    ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'EECDH+ECDSA+AESGCM:EECDH+aRSA+AESGCM:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers on;
        ssl_ecdh_curve secp384r1;  # 提升 ECC 兼容性[4](@ref)

	    # 安全头配置
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload";
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        # 处理静态文件
        # location /static/ {
        #    alias /path/to/your/static/files/;
        #    expires 30d;
        # }
        # 屏蔽对 .env 文件的访问
        location ~ /\.env {
