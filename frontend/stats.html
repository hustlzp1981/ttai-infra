<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>训练统计 - TTAI</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-inner">
          <a class="brand" href="index.html">
            <span class="brand-mark">TT</span>
            <span>TTAI 乒乓训练</span>
          </a>
          <nav class="nav-links">
            <a href="index.html">首页</a>
            <a href="videos.html">视频库</a>
            <a class="active" href="stats.html">训练统计</a>
            <a href="tech.html">日常训练</a>
            <a href="my.html">我的</a>
            <a href="login.html">登录</a>
          </nav>
        </div>
      </header>

      <main class="main">
        <div class="container">
          <section class="section">
            <h2 class="card-title">训练统计</h2>
            <div class="upload-actions">
              <button class="btn btn-secondary btn-primary" type="button" data-days="30">近30天</button>
              <button class="btn btn-secondary" type="button" data-days="90">近90天</button>
              <button class="btn btn-secondary" type="button" data-days="180">近半年</button>
            </div>
          </section>

          <section class="section">
            <h3 class="card-title">训练概览</h3>
            <div class="stat-grid">
              <div class="stat-card">
                <h4>本月训练天数</h4>
                <p id="stat-days">--</p>
              </div>
              <div class="stat-card">
                <h4>累计时长</h4>
                <p id="stat-hours">--</p>
              </div>
              <div class="stat-card">
                <h4>连续打卡</h4>
                <p id="stat-streak">--</p>
              </div>
              <div class="stat-card">
                <h4>AI 综合分</h4>
                <p id="stat-score">--</p>
              </div>
            </div>
          </section>

          <section class="section">
            <h3 class="card-title">标签分布</h3>
            <div class="card">
              <div id="tag-list" class="muted"></div>
              <div class="empty-state" id="tag-empty">标签分布将根据训练日志自动更新。</div>
            </div>
          </section>

          <section class="section">
            <h3 class="card-title">AI 评分趋势</h3>
            <div class="chart-card">
              <div class="trend-summary" id="trend-summary">最近暂无评分趋势数据。</div>
              <canvas id="score-canvas" class="chart-canvas"></canvas>
              <div class="empty-state" id="score-trend">折线图区域（接入数据后显示）。</div>
            </div>
          </section>
        </div>
      </main>

      <footer>
        <p>&copy; <span id="year"></span> TTAI. All rights reserved.</p>
      </footer>
    </div>
    <script src="config.js"></script>
    <script src="stats.js"></script>
    <script>
      document.getElementById('year').textContent = new Date().getFullYear();
    </script>
  </body>
</html>
