<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>培训招生 - TTAI</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-inner">
          <a class="brand" href="index.html">
            <span class="brand-mark">TT</span>
            <span>TTAI 乒乓训练</span>
          </a>
          <nav class="nav-links">
            <a href="index.html">首页</a>
            <a href="videos.html">视频库</a>
            <a href="tech.html">日常训练</a>
            <a class="active" href="training-enroll.html">培训招生</a>
            <a href="stats.html">训练统计</a>
            <a href="my.html">我的</a>
            <a href="login.html" id="nav-login">登录</a>
            <div class="nav-user" id="nav-user" style="display: none;">
              <img class="nav-avatar" id="nav-avatar" alt="头像">
              <span class="nav-name" id="nav-name">已登录</span>
              <button class="nav-logout" id="nav-logout" type="button">退出</button>
            </div>
          </nav>
        </div>
      </header>

      <main class="main">
        <div class="container">
          <section class="section">
            <div class="clubs-hero">
              <h2 class="card-title">🏓 培训招生</h2>
              <p class="muted">发现附近优质俱乐部，开启 AI 训练之旅。</p>
            </div>
            <div class="filter-row">
              <span class="filter-label">城市</span>
              <select class="filter-select" id="city-select">
                <option value="上海">上海</option>
              </select>
              <span class="filter-label">区域</span>
              <select class="filter-select" id="district-select"></select>
            </div>
            <div class="loading-state" id="clubs-loading">加载中...</div>
            <div class="club-list" id="clubs-list"></div>
            <div class="empty-state" id="clubs-empty">暂无俱乐部信息</div>
          </section>

          <section class="section">
            <div class="ai-guide">
              <div>
                <h3 class="card-title">还没有合适的选择？</h3>
                <p class="muted">上传训练视频，AI 免费帮你分析。</p>
              </div>
              <a class="btn btn-primary" href="index.html#upload-video">开始 AI 训练</a>
            </div>
          </section>
        </div>
      </main>

      <footer>
        <p>&copy; <span id="year"></span> TTAI. All rights reserved.</p>
      </footer>
    </div>
    <script src="config.js"></script>
    <script src="nav-auth.js"></script>
    <script src="training-enroll.js"></script>
    <script>
      document.getElementById('year').textContent = new Date().getFullYear();
    </script>
  </body>
</html>
