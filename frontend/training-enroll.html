<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>俱乐部 - TTAI</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-inner">
          <a class="brand" href="index.html">
            <span class="brand-mark">TT</span>
            <span>TTAI 乒乓训练</span>
          </a>
          <nav class="nav-links">
            <a href="index.html">首页</a>
            <a href="videos.html">视频库</a>
            <a href="tech.html">日常训练</a>
            <a class="active" href="training-enroll.html">俱乐部</a>
            <a href="stats.html">训练统计</a>
            <a href="my.html">我的</a>
            <a href="login.html" id="nav-login">登录</a>
            <div class="nav-user" id="nav-user" style="display: none;">
              <img class="nav-avatar" id="nav-avatar" alt="头像">
              <span class="nav-name" id="nav-name">已登录</span>
              <button class="nav-logout" id="nav-logout" type="button">退出</button>
            </div>
          </nav>
        </div>
      </header>

      <main class="main">
        <div class="container">
          <section class="section">
            <div class="clubs-hero">
              <h2 class="card-title">俱乐部</h2>
              <p class="muted">发现附近俱乐部，报名训练，并用 AI 记录成长。</p>
            </div>
            <div class="filter-row">
              <span class="filter-label">城市</span>
              <select class="filter-select" id="city-select">
                <option value="上海">上海</option>
              </select>
              <span class="filter-label">区域</span>
              <select class="filter-select" id="district-select"></select>
              <span class="filter-label">类型</span>
              <button class="filter-chip active" type="button" data-tag="">全部</button>
              <button class="filter-chip" type="button" data-tag="青少年训练">青少年</button>
              <button class="filter-chip" type="button" data-tag="成人提高">成人提高</button>
              <button class="filter-chip" type="button" data-tag="一对一">一对一</button>
              <button class="filter-chip" type="button" data-tag="AI 训练">AI 训练</button>
            </div>
            <div class="loading-state" id="clubs-loading">加载中...</div>
            <div class="club-list" id="clubs-list"></div>
            <div class="empty-state" id="clubs-empty">暂无俱乐部信息</div>
          </section>

          <section class="section">
            <div class="ai-guide">
              <div>
                <h3 class="card-title">我是俱乐部，想合作引流</h3>
                <p class="muted">TTAI 可以为俱乐部提供展示页、招生线索和会员训练数据看板。</p>
              </div>
              <div class="club-actions">
                <a class="btn btn-secondary" href="club-admin.html">俱乐部管理员登录</a>
                <a class="btn btn-primary" href="index.html#upload-video">先体验 AI 训练</a>
              </div>
            </div>
          </section>
        </div>
      </main>

      <footer>
        <p>&copy; <span id="year"></span> TTAI. All rights reserved.</p>
      </footer>
    </div>
    <script src="config.js"></script>
    <script src="nav-auth.js"></script>
    <script src="club-data.js"></script>
    <script src="training-enroll.js"></script>
    <script>
      document.getElementById('year').textContent = new Date().getFullYear();
    </script>
  </body>
</html>
