<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>视频详情 - TTAI</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-inner">
          <a class="brand" href="index.html">
            <span class="brand-mark">TT</span>
            <span>TTAI 乒乓训练</span>
          </a>
          <nav class="nav-links">
            <a href="index.html">首页</a>
            <a href="videos.html">视频库</a>
            <a href="tech.html">日常训练</a>
            <a href="training-enroll.html">俱乐部</a>
            <a href="stats.html">训练统计</a>
            <a href="my.html">我的</a>
            <a href="login.html" id="nav-login">登录</a>
            <div class="nav-user" id="nav-user" style="display: none;">
              <img class="nav-avatar" id="nav-avatar" alt="头像">
              <span class="nav-name" id="nav-name">已登录</span>
              <button class="nav-logout" id="nav-logout" type="button">退出</button>
            </div>
          </nav>
        </div>
      </header>

      <main class="main">
        <div class="container">
          <section class="section">
            <h2 class="card-title" id="video-title">训练分析 - 视频详情</h2>
            <p class="muted" id="video-meta"></p>
            <video controls width="100%" poster="images/main.png" id="video-player">
              <source src="" type="video/mp4">
            </video>
          </section>

          <section class="section">
            <div class="grid-2">
              <div class="card">
                <h3 class="card-title">基础信息</h3>
                <p class="muted" id="video-info">标题 / 日期 / 时长 / 模式 / 片段数</p>
                <div class="upload-actions">
                  <button class="btn btn-secondary" type="button" id="btn-download">下载视频</button>
                  <button class="btn btn-secondary" type="button" id="btn-edit">编辑标题</button>
                  <button class="btn btn-secondary" type="button" id="btn-delete">删除</button>
                </div>
              </div>
              <div class="card" id="overlay-box">
                <h3 class="card-title">覆盖层切换</h3>
                <p class="muted">仅训练分析模式支持覆盖层。</p>
                <div class="overlay-status" id="overlay-status">选择覆盖层即可切换训练视图。</div>
                <div class="upload-actions">
                  <button class="btn btn-secondary btn-primary" type="button" data-overlay="all">全部</button>
                  <button class="btn btn-secondary" type="button" data-overlay="skeleton">骨骼</button>
                  <button class="btn btn-secondary" type="button" data-overlay="fishbone">鱼骨</button>
                  <button class="btn btn-secondary" type="button" data-overlay="angles">角度</button>
                </div>
              </div>
            </div>
          </section>

          <section class="section">
            <h3 class="card-title">AI 评分</h3>
            <div class="stat-grid" id="score-grid"></div>
          </section>
        </div>
      </main>

      <footer>
        <p>&copy; <span id="year"></span> TTAI. All rights reserved.</p>
      </footer>
    </div>
    <script src="config.js"></script>
    <script src="nav-auth.js"></script>
    <script src="video-detail.js"></script>
    <script>
      document.getElementById('year').textContent = new Date().getFullYear();
    </script>
  </body>
</html>
