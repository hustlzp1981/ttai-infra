<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>视频库 - TTAI</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-inner">
          <a class="brand" href="index.html">
            <span class="brand-mark">TT</span>
            <span>TTAI 乒乓训练</span>
          </a>
          <nav class="nav-links">
            <a href="index.html">首页</a>
            <a class="active" href="videos.html">视频库</a>
            <a href="tech.html">日常训练</a>
            <a href="training-enroll.html">俱乐部</a>
            <a href="stats.html">训练统计</a>
            <a href="my.html">我的</a>
            <a href="login.html" id="nav-login">登录</a>
            <div class="nav-user" id="nav-user" style="display: none;">
              <img class="nav-avatar" id="nav-avatar" alt="头像">
              <span class="nav-name" id="nav-name">已登录</span>
              <button class="nav-logout" id="nav-logout" type="button">退出</button>
            </div>
          </nav>
        </div>
      </header>

      <main class="main">
        <div class="container">
          <section class="section">
            <div class="section-header">
              <div>
                <h2 class="card-title">视频库</h2>
                <p class="muted">按模式筛选比赛剪辑与训练分析，支持前端搜索和批量管理。</p>
              </div>
              <a class="btn btn-primary" href="index.html#upload-video">上传分析</a>
            </div>
            <div class="video-library-summary">
              <div class="stat-card">
                <h4>全部视频</h4>
                <p id="video-total">--</p>
              </div>
              <div class="stat-card">
                <h4>已加载</h4>
                <p id="video-loaded">--</p>
              </div>
              <div class="stat-card">
                <h4>当前筛选</h4>
                <p id="video-visible">--</p>
              </div>
            </div>
            <div class="video-library-toolbar">
              <div class="upload-actions">
                <button class="btn btn-secondary btn-primary" type="button" data-mode="">全部</button>
                <button class="btn btn-secondary" type="button" data-mode="match_clip">比赛剪辑</button>
                <button class="btn btn-secondary" type="button" data-mode="training_analysis">训练分析</button>
              </div>
              <div class="video-search-box">
                <input type="search" id="video-search" placeholder="搜索标题、模式、日期">
              </div>
              <button class="btn btn-secondary" type="button" id="manage-toggle">管理</button>
            </div>
          </section>

          <section class="section">
            <div class="section-header compact">
              <div>
                <h3 class="card-title">视频列表</h3>
                <p class="muted" id="video-list-note">展示最近加载的视频记录。</p>
              </div>
              <div class="batch-actions" id="batch-actions" hidden>
                <span id="selected-count">已选 0 个</span>
                <button class="btn btn-secondary" type="button" id="select-all">全选当前</button>
                <button class="btn btn-primary" type="button" id="delete-selected">删除所选</button>
              </div>
            </div>
            <ul id="video-list"></ul>
            <div class="empty-state" id="video-empty">暂无更多视频记录。</div>
            <div class="upload-actions" style="justify-content:center; margin-top: 16px;">
              <button class="btn btn-secondary" type="button" id="load-more">加载更多</button>
            </div>
          </section>
        </div>
      </main>

      <footer>
        <p>&copy; <span id="year"></span> TTAI. All rights reserved.</p>
      </footer>
    </div>
    <script src="config.js"></script>
    <script src="nav-auth.js"></script>
    <script src="videos.js"></script>
    <script>
      document.getElementById('year').textContent = new Date().getFullYear();
    </script>
  </body>
</html>
